<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フェルミ推定トレーニング | 中小企業診断士試験対策</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700;900&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0a1628;--navy-light:#132039;--navy-mid:#1a2d4d;
  --gold:#c5a44e;--gold-light:#e2ca7a;--gold-dim:rgba(197,164,78,.12);
  --slate:#8896a7;--slate-light:#b0bcc9;
  --white:#f4f6f8;--pure-white:#fff;
  --green:#2ecc71;--green-bg:rgba(46,204,113,.1);
  --red:#e74c3c;--red-bg:rgba(231,76,60,.1);
  --blue:#3498db;--blue-bg:rgba(52,152,219,.1);
  --card-bg:#0f1f38;--card-border:#1e3456;
  --radius:10px;
  --shadow:0 4px 24px rgba(0,0,0,.3);
}
html{font-size:15px;scroll-behavior:smooth}
body{
  font-family:'Noto Sans JP','IBM Plex Sans',sans-serif;
  background:var(--navy);color:var(--white);
  min-height:100vh;line-height:1.7;
  background-image:
    radial-gradient(ellipse at 20% 0%,rgba(197,164,78,.06) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 100%,rgba(52,152,219,.04) 0%,transparent 60%);
}
.container{max-width:860px;margin:0 auto;padding:1.5rem}

/* Header */
.header{text-align:center;padding:2.5rem 0 1.5rem;position:relative}
.header::after{content:'';display:block;width:60px;height:3px;background:var(--gold);margin:1rem auto 0;border-radius:2px}
.header h1{
  font-size:1.6rem;font-weight:700;letter-spacing:.08em;
  background:linear-gradient(135deg,var(--gold-light),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.header p{color:var(--slate);font-size:.82rem;margin-top:.5rem;font-weight:300;letter-spacing:.04em}

/* Navigation tabs */
.nav{display:flex;gap:.5rem;justify-content:center;margin-bottom:2rem;flex-wrap:wrap}
.nav-btn{
  padding:.55rem 1.4rem;border-radius:6px;border:1px solid var(--card-border);
  background:transparent;color:var(--slate);cursor:pointer;font-size:.82rem;
  font-family:inherit;font-weight:500;transition:all .25s;letter-spacing:.02em;
}
.nav-btn:hover{border-color:var(--gold);color:var(--gold-light)}
.nav-btn.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}

/* Cards */
.card{
  background:var(--card-bg);border:1px solid var(--card-border);
  border-radius:var(--radius);padding:1.8rem;margin-bottom:1.2rem;
  box-shadow:var(--shadow);
}

/* Dashboard */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:.8rem;margin-bottom:1.5rem}
.stat-card{
  background:var(--navy-light);border:1px solid var(--card-border);
  border-radius:8px;padding:1rem 1.2rem;text-align:center;
}
.stat-card .num{font-size:1.8rem;font-weight:700;font-family:'JetBrains Mono',monospace}
.stat-card .num.gold{color:var(--gold)}
.stat-card .num.green{color:var(--green)}
.stat-card .num.blue{color:var(--blue)}
.stat-card .label{font-size:.72rem;color:var(--slate);margin-top:.2rem;letter-spacing:.03em}

/* Progress bar */
.progress-wrap{margin-bottom:1.5rem}
.progress-label{display:flex;justify-content:space-between;font-size:.75rem;color:var(--slate);margin-bottom:.4rem}
.progress-bar{height:6px;background:var(--navy-mid);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:3px;transition:width .5s ease}

/* Quiz UI */
.q-header{display:flex;align-items:center;gap:.7rem;margin-bottom:1.2rem;flex-wrap:wrap}
.badge{
  padding:.2rem .7rem;border-radius:4px;font-size:.7rem;font-weight:600;letter-spacing:.04em;
}
.badge-industry{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(52,152,219,.25)}
.badge-beginner{background:var(--green-bg);color:var(--green);border:1px solid rgba(46,204,113,.25)}
.badge-intermediate{background:rgba(241,196,15,.1);color:#f1c40f;border:1px solid rgba(241,196,15,.25)}
.badge-advanced{background:var(--red-bg);color:var(--red);border:1px solid rgba(231,76,60,.25)}
.q-number{font-size:.75rem;color:var(--slate);margin-left:auto;font-family:'JetBrains Mono',monospace}

.q-text{font-size:1.05rem;font-weight:500;line-height:1.8;margin-bottom:1.5rem;color:var(--pure-white)}

/* Timer */
.timer-wrap{display:flex;align-items:center;gap:.6rem;margin-bottom:1.3rem;padding:.6rem 1rem;background:var(--navy-mid);border-radius:6px}
.timer-icon{font-size:1rem}
.timer-bar-outer{flex:1;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.timer-bar-inner{height:100%;background:var(--gold);border-radius:3px;transition:width 1s linear}
.timer-bar-inner.warn{background:var(--red)}
.timer-text{font-size:.78rem;font-family:'JetBrains Mono',monospace;color:var(--slate-light);min-width:42px;text-align:right}

/* Options */
.options{display:flex;flex-direction:column;gap:.6rem}
.opt-btn{
  display:flex;align-items:flex-start;gap:.8rem;padding:1rem 1.2rem;
  background:var(--navy-light);border:1.5px solid var(--card-border);
  border-radius:8px;cursor:pointer;text-align:left;
  font-family:inherit;font-size:.85rem;color:var(--white);
  transition:all .2s;line-height:1.65;width:100%;
}
.opt-btn:hover:not(:disabled){border-color:var(--gold);background:var(--gold-dim)}
.opt-btn .opt-label{
  flex-shrink:0;width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.75rem;
  background:var(--navy-mid);border:1.5px solid var(--card-border);
  margin-top:1px;transition:all .2s;
}
.opt-btn:hover:not(:disabled) .opt-label{border-color:var(--gold);color:var(--gold)}
.opt-btn.correct{border-color:var(--green);background:var(--green-bg)}
.opt-btn.correct .opt-label{background:var(--green);color:var(--navy);border-color:var(--green)}
.opt-btn.wrong{border-color:var(--red);background:var(--red-bg)}
.opt-btn.wrong .opt-label{background:var(--red);color:var(--pure-white);border-color:var(--red)}
.opt-btn:disabled{cursor:default;opacity:.65}
.opt-btn.correct:disabled,.opt-btn.wrong:disabled{opacity:1}

/* Explanation */
.explanation{
  margin-top:1.5rem;padding:1.4rem;background:var(--navy-mid);
  border-left:3px solid var(--gold);border-radius:0 8px 8px 0;
  animation:fadeIn .4s ease;
}
.explanation h4{color:var(--gold);font-size:.88rem;margin-bottom:.7rem;font-weight:600;letter-spacing:.03em}
.explanation p,.explanation li{font-size:.83rem;color:var(--slate-light);line-height:1.8}
.explanation .formula{
  font-family:'JetBrains Mono',monospace;font-size:.8rem;
  background:var(--navy);padding:.8rem 1rem;border-radius:6px;margin:.7rem 0;
  color:var(--gold-light);border:1px solid var(--card-border);
  overflow-x:auto;white-space:pre-wrap;word-break:break-all;
}
.explanation ul{padding-left:1.2rem;margin:.5rem 0}
.explanation li{margin-bottom:.3rem}

.next-btn{
  margin-top:1.3rem;padding:.7rem 2rem;
  background:linear-gradient(135deg,var(--gold),var(--gold-light));
  color:var(--navy);border:none;border-radius:6px;
  font-family:inherit;font-size:.88rem;font-weight:600;
  cursor:pointer;transition:all .2s;letter-spacing:.03em;
}
.next-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(197,164,78,.3)}

/* History */
.history-controls{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.history-controls select,.history-controls button{
  padding:.45rem .8rem;border-radius:5px;font-family:inherit;font-size:.78rem;
  border:1px solid var(--card-border);background:var(--navy-light);color:var(--white);cursor:pointer;
}
.history-controls button:hover{border-color:var(--gold)}
.del-all-btn{color:var(--red)!important;border-color:rgba(231,76,60,.3)!important}
.del-all-btn:hover{background:var(--red-bg)!important}

.history-table{width:100%;border-collapse:collapse;font-size:.8rem}
.history-table th{
  text-align:left;padding:.6rem .8rem;color:var(--slate);font-weight:500;
  border-bottom:1px solid var(--card-border);font-size:.72rem;letter-spacing:.04em;
}
.history-table td{padding:.55rem .8rem;border-bottom:1px solid rgba(30,52,86,.5);vertical-align:middle}
.history-table tr:hover td{background:rgba(255,255,255,.02)}
.result-correct{color:var(--green);font-weight:600}
.result-wrong{color:var(--red);font-weight:600}
.del-row-btn{
  background:none;border:1px solid rgba(231,76,60,.25);color:var(--red);
  padding:.2rem .5rem;border-radius:4px;cursor:pointer;font-size:.7rem;font-family:inherit;
}
.del-row-btn:hover{background:var(--red-bg)}

.empty-state{text-align:center;padding:2.5rem 1rem;color:var(--slate)}
.empty-state .icon{font-size:2.5rem;margin-bottom:.7rem;opacity:.5}
.empty-state p{font-size:.85rem}

/* Start screen */
.start-screen{text-align:center;padding:1rem 0}
.start-screen h2{font-size:1.2rem;font-weight:600;margin-bottom:.8rem}
.start-screen p{color:var(--slate);font-size:.85rem;margin-bottom:1.5rem;line-height:1.8}
.start-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:.7rem;margin-bottom:1.5rem;text-align:left}
.start-grid .item{padding:.8rem 1rem;background:var(--navy-mid);border-radius:6px;font-size:.8rem;border:1px solid var(--card-border)}
.start-grid .item strong{color:var(--gold);display:block;margin-bottom:.2rem;font-size:.75rem;letter-spacing:.03em}
.start-btn{
  padding:.8rem 3rem;background:linear-gradient(135deg,var(--gold),var(--gold-light));
  color:var(--navy);border:none;border-radius:8px;font-family:inherit;
  font-size:1rem;font-weight:700;cursor:pointer;transition:all .25s;letter-spacing:.05em;
}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(197,164,78,.35)}

/* Filter chips */
.filter-chips{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1rem}
.chip{
  padding:.3rem .7rem;border-radius:20px;font-size:.72rem;
  border:1px solid var(--card-border);background:transparent;
  color:var(--slate);cursor:pointer;font-family:inherit;transition:all .2s;
}
.chip:hover,.chip.active{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}

/* Complete screen */
.complete-screen{text-align:center;padding:2rem 0}
.complete-screen h2{font-size:1.4rem;font-weight:700;color:var(--gold);margin-bottom:.5rem}
.complete-screen .big-score{font-size:3.5rem;font-weight:900;font-family:'JetBrains Mono',monospace;margin:1rem 0}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .35s ease}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--navy)}
::-webkit-scrollbar-thumb{background:var(--navy-mid);border-radius:3px}

/* Responsive */
@media(max-width:600px){
  html{font-size:14px}
  .container{padding:1rem}
  .card{padding:1.3rem}
  .q-header{gap:.4rem}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .opt-btn{padding:.8rem 1rem;font-size:.82rem}
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>フェルミ推定トレーニング</h1>
    <p>中小企業診断士試験対策 — 論理構築力 × 数値感覚</p>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="showPage('home')">ダッシュボード</button>
    <button class="nav-btn" onclick="showPage('quiz')">演習開始</button>
    <button class="nav-btn" onclick="showPage('history')">学習履歴</button>
  </div>

  <div id="page-home"></div>
  <div id="page-quiz" style="display:none"></div>
  <div id="page-history" style="display:none"></div>
</div>

<script>
// ===== QUESTION DATA =====
const QUESTIONS = [
// ── 製造業 ──
{
  id:1, industry:"製造業", level:"初級",
  question:"日本国内における自動車部品（ブレーキパッド）の年間市場規模をフェルミ推定せよ。",
  options:[
    {label:"A",text:"乗用車保有台数6,200万台 × 全車が毎年交換 × 単価8,000円 ≒ 約5,000億円",correct:false},
    {label:"B",text:"乗用車6,200万台 × 交換率25%/年 × 前後4セット × 単価5,000円 ≒ 約3,100億円",correct:false},
    {label:"C",text:"乗用車6,200万台 × 交換率25%/年 × 1セット(前輪) × 単価8,000円 ≒ 約1,240億円",correct:true},
    {label:"D",text:"新車販売台数400万台 × 単価8,000円 ≒ 約320億円",correct:false},
    {label:"E",text:"乗用車6,200万台 × 車検2年毎に全交換 × 単価3,000円 ≒ 約930億円",correct:false}
  ],
  explanation:{
    summary:"ブレーキパッドは消耗品であり、保有台数ベースで「交換サイクル」と「1回あたりの単価」で推定します。",
    formula:"市場規模 ≒ 保有台数 × 年間交換率 × 平均交換セット数 × セット単価\n= 6,200万台 × 25% × 1セット × 8,000円\n≒ 1,240億円",
    points:["保有台数（≒6,200万台）は国交省統計の基本数値","ブレーキパッドの平均寿命は3〜5万km → 年間走行距離1万km前後を考慮すると年間交換率は約25%","Aは全車が毎年交換する前提で過大","Bは前後4セット全交換としており過大（通常はフロント中心）","Dは新車販売台数のみで保有台数の概念が欠落"]
  },
  timer:180
},
{
  id:2, industry:"製造業", level:"初級",
  question:"日本の中小製造業（従業員20人規模）1社あたりの年間電力コストをフェルミ推定せよ。",
  options:[
    {label:"A",text:"月間使用量5,000kWh × 単価25円/kWh × 12ヶ月 ≒ 約1,500万円",correct:true},
    {label:"B",text:"従業員20人 × 1人あたり月5万円 × 12ヶ月 ≒ 約1,200万円",correct:false},
    {label:"C",text:"工場面積300坪 × 坪単価1万円/月 × 12ヶ月 ≒ 約3,600万円",correct:false},
    {label:"D",text:"売上高2億円 × 電力コスト比率1% ≒ 約200万円",correct:false},
    {label:"E",text:"月間使用量50,000kWh × 単価30円/kWh × 12ヶ月 ≒ 約1.8億円",correct:false}
  ],
  explanation:{
    summary:"中小製造業の電力コストは、工場設備の使用電力量と電気料金単価から推定します。",
    formula:"年間電力コスト ≒ 月間使用電力量 × 電力単価 × 12ヶ月\n= 5,000kWh × 25円 × 12 ≒ 1,500万円",
    points:["従業員20人規模の町工場は月間3,000〜8,000kWh程度が目安","産業用電力単価は約20〜28円/kWh","Bの「1人5万円」は根拠不明のトップダウンで精度が低い","Dの売上比率1%は過少（製造業の電力費比率は3〜8%が一般的）","Eは中規模以上の工場水準で過大"]
  },
  timer:180
},
{
  id:3, industry:"製造業", level:"初級",
  question:"日本における産業用ロボットの年間国内出荷台数をフェルミ推定せよ。",
  options:[
    {label:"A",text:"製造業事業所数18万 × 導入率5% × 平均1台 ≒ 約9,000台",correct:false},
    {label:"B",text:"製造業事業所数18万 × 導入率15% × 更新率15%/年 + 新規導入 ≒ 約5万台",correct:true},
    {label:"C",text:"自動車工場のみ1,000工場 × 平均10台/年 ≒ 約1万台",correct:false},
    {label:"D",text:"世界出荷台数50万台 × 日本シェア50% ≒ 約25万台",correct:false},
    {label:"E",text:"GDP比例で米国15万台の1/3 ≒ 約5万台だが、為替補正で3万台",correct:false}
  ],
  explanation:{
    summary:"産業用ロボットの出荷台数は、既存稼働台数の更新需要＋新規導入需要で推定します。",
    formula:"国内出荷台数 ≒ 稼働台数 × 更新率 + 新規導入\n≒ (18万所 × 15% × 平均2台) × 15%/年 + 新規約1万台\n≒ 約5万台（実績値:約4.5〜5万台）",
    points:["日本は産業用ロボット大国だが、出荷の多くは輸出","国内向けは年間約4〜5万台が実績値","Aは導入率・台数が過少","Dの世界シェア50%は輸出含めた生産シェアと混同","自動車産業以外（電機・食品等）の需要も大きい"]
  },
  timer:180
},
{
  id:4, industry:"製造業", level:"中級",
  question:"従業員100人規模の金属加工メーカーにおける「設備稼働率」の適正値と、稼働率1%向上による年間利益改善額をフェルミ推定せよ。",
  options:[
    {label:"A",text:"適正稼働率90% → 1%向上で年間売上10億円×粗利率30%×1%≒300万円の改善",correct:false},
    {label:"B",text:"適正稼働率85% → 1%向上で固定費5億円×1%≒500万円のコスト吸収改善",correct:true},
    {label:"C",text:"適正稼働率95% → 1%向上で人件費削減効果のみ≒100万円",correct:false},
    {label:"D",text:"適正稼働率70% → 1%向上で外注費削減3,000万円×1%≒30万円",correct:false},
    {label:"E",text:"適正稼働率80% → 1%向上で売上20億円×営業利益率5%×1%≒100万円",correct:false}
  ],
  explanation:{
    summary:"稼働率向上は「固定費の吸収効率」改善に直結します。変動費ではなく固定費ベースで考えることがポイントです。",
    formula:"利益改善額 ≒ 年間固定費 × 稼働率改善幅\n従業員100人 × 平均年収500万円 ＋ 設備減価償却等 ≒ 固定費約5億円\n5億円 × 1% ≒ 500万円",
    points:["中小金属加工業の適正稼働率は80〜90%（85%前後が現実的）","稼働率問題の本質は固定費の回収効率","Aは売上×粗利率で計算しているが、稼働率改善＝追加売上ではない","Cの95%は過負荷（品質低下・メンテナンス不足リスク）","Eの営業利益率ベースの計算は稼働率との関係が間接的"]
  },
  timer:240
},
{
  id:5, industry:"製造業", level:"中級",
  question:"日本の食品製造業全体における年間フードロス（製造段階）の経済損失額をフェルミ推定せよ。",
  options:[
    {label:"A",text:"食品製造業出荷額35兆円 × ロス率0.5% ≒ 約1,750億円",correct:false},
    {label:"B",text:"食品製造業出荷額35兆円 × ロス率3% × 原価率60% ≒ 約6,300億円",correct:true},
    {label:"C",text:"食品廃棄量600万トン × 全量が製造段階 × kg単価200円 ≒ 1.2兆円",correct:false},
    {label:"D",text:"コンビニ廃棄のみ5万店 × 日500円 × 365日 ≒ 約90億円",correct:false},
    {label:"E",text:"家庭系ロス300万トン × 単価500円/kg ≒ 1.5兆円",correct:false}
  ],
  explanation:{

    formula:"SaaS市場規模 ≒ SaaS利用企業数 × 平均年間支出\n= 200万社 × 60万円 ≒ 約1.2兆円\n中小企業1社あたり: 月額3〜5万円（会計・勤怠・CRM等3〜5サービス）",
    points:["日本のSaaS市場は約1〜1.5兆円規模","中小企業のSaaS利用は急速に拡大中だが単価は低い","Dは大企業のみで中小企業市場を無視","Eはクラウド全体（IaaS/PaaS含む）とSaaSを混同","中小企業は月額3,000〜10,000円のサービスを3〜5個利用が典型的"]
  },
  timer:300
},
{
  id:30, industry:"サービス業", level:"上級",
  question:"日本の「コンサルティング業界全体（経営・IT・人事・財務等）」の年間市場規模と、GDP比率をフェルミ推定せよ。",
  options:[
    {label:"A",text:"コンサルタント20万人 × 平均売上単価2,000万円 ≒ 4兆円、GDP比0.7%",correct:true},
    {label:"B",text:"大手4社（MBB+アクセンチュア）日本売上合計1兆円 ≒ 市場全体も約1兆円",correct:false},
    {label:"C",text:"企業の外部委託費10兆円 × コンサル比率50% ≒ 5兆円、GDP比1%",correct:false},
    {label:"D",text:"米国コンサル市場30兆円 × GDP比率換算 → 日本は10兆円規模",correct:false},
    {label:"E",text:"中小企業診断士5万人 × 平均年収600万円 ≒ 約3,000億円がコンサル市場全体",correct:false}
  ],
  explanation:{
    summary:"コンサル市場は「コンサルタント人数 × 1人あたり売上」のボトムアップ推定が有効です。",
    formula:"市場規模 ≒ コンサルタント人数 × 平均売上単価\n= 20万人 × 2,000万円 ≒ 4兆円\nGDP比率 = 4兆円 ÷ 560兆円 ≒ 約0.7%",
    points:["日本のコンサル市場は約3〜5兆円と推計される","GDP比率は米国(約1.5%)より低い0.5〜1.0%程度","Bは大手のみで中堅・ブティック系・個人事務所を含まない","Dは日米のコンサル浸透度の違いを無視","Eは中小企業診断士のみでIT・戦略・人事コンサルを含まない"]
  },
  timer:300
}
];

// ===== APP STATE =====
let state = {
  page:'home',
  quizStarted:false,
  currentQ:null,
  answered:false,
  selectedIdx:null,
  timerInterval:null,
  timerRemaining:0,
  pool:[],          // remaining question indices
  sessionCorrect:0,
  sessionTotal:0,
  historyFilter:'all'
};

// ===== LOCALSTORAGE =====
function getHistory(){
  try{return JSON.parse(localStorage.getItem('fermi_history')||'[]')}catch{return[]}
}
function saveHistory(h){localStorage.setItem('fermi_history',JSON.stringify(h))}
function addHistory(q,correct){
  const h=getHistory();
  h.unshift({date:new Date().toISOString(),qId:q.id,title:q.question.slice(0,40)+'…',industry:q.industry,level:q.level,correct});
  saveHistory(h);
}

// ===== POOL MANAGEMENT =====
function initPool(){
  state.pool=[...Array(QUESTIONS.length).keys()];
  shuffle(state.pool);
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}
function nextFromPool(){
  if(state.pool.length===0) return null;
  return state.pool.shift();
}

// ===== NAVIGATION =====
function showPage(p){
  state.page=p;
  document.querySelectorAll('.nav-btn').forEach((b,i)=>{
    b.classList.toggle('active',['home','quiz','history'][i]===p);
  });
  document.getElementById('page-home').style.display=p==='home'?'':'none';
  document.getElementById('page-quiz').style.display=p==='quiz'?'':'none';
  document.getElementById('page-history').style.display=p==='history'?'':'none';
  if(p==='home') renderHome();
  if(p==='quiz') renderQuiz();
  if(p==='history') renderHistory();
}

// ===== HOME PAGE =====
function renderHome(){
  const h=getHistory();
  const total=h.length;
  const correct=h.filter(x=>x.correct).length;
  const rate=total?Math.round(correct/total*100):0;
  const unique=new Set(h.map(x=>x.qId)).size;

  document.getElementById('page-home').innerHTML=`
    <div class="stats-grid fade-in">
      <div class="stat-card"><div class="num gold">${total}</div><div class="label">総回答数</div></div>
      <div class="stat-card"><div class="num green">${rate}%</div><div class="label">正答率</div></div>
      <div class="stat-card"><div class="num blue">${unique}/30</div><div class="label">到達問題数</div></div>
      <div class="stat-card"><div class="num gold">${state.sessionCorrect}/${state.sessionTotal}</div><div class="label">今回のセッション</div></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-label"><span>全問制覇への進捗</span><span>${unique}/30問</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${unique/30*100}%"></div></div>
    </div>
    <div class="card start-screen fade-in">
      <h2>フェルミ推定の思考力を磨く</h2>
      <p>中小企業診断士試験に求められる「論理構築力」と「数値感覚」を<br>4業界・3レベル・全30問の演習で徹底トレーニング。</p>
      <div class="start-grid">
        <div class="item"><strong>製造業（8問）</strong>部品市場・設備稼働率・DX投資・カーボンニュートラル等</div>
        <div class="item"><strong>小売業（8問）</strong>店舗売上・EC返品率・ラストワンマイル・決済手数料等</div>
        <div class="item"><strong>卸売業（7問）</strong>食品卸・医薬品物流・在庫回転・BtoB EC等</div>
        <div class="item"><strong>サービス業（7問）</strong>理美容・人材紹介・介護人材・SaaS・コンサル市場等</div>
      </div>
      <button class="start-btn" onclick="startQuiz()">演習を開始する</button>
    </div>
  `;
}

// ===== QUIZ =====
function startQuiz(){
  initPool();
  state.quizStarted=true;
  state.sessionCorrect=0;
  state.sessionTotal=0;
  loadNextQuestion();
  showPage('quiz');
}

function loadNextQuestion(){
  clearTimer();
  state.answered=false;
  state.selectedIdx=null;
  const idx=nextFromPool();
  if(idx===null){
    renderComplete();
    return;
  }
  state.currentQ=QUESTIONS[idx];
  renderQuiz();
}

function renderQuiz(){
  const el=document.getElementById('page-quiz');
  if(!state.quizStarted){
    el.innerHTML=`<div class="card start-screen fade-in">
      <h2>演習を開始しましょう</h2>
      <p>ダッシュボードの「演習を開始する」ボタン、<br>またはこちらからスタートできます。</p>
      <button class="start-btn" onclick="startQuiz()">ランダム出題で開始</button>
    </div>`;
    return;
  }
  const q=state.currentQ;
  if(!q) return;

  const levelClass=q.level==='初級'?'badge-beginner':q.level==='中級'?'badge-intermediate':'badge-advanced';
  const timerSec=q.timer;
  const remaining=30-state.pool.length;

  let html=`<div class="card fade-in">
    <div class="q-header">
      <span class="badge badge-industry">${q.industry}</span>
      <span class="badge ${levelClass}">${q.level}</span>
      <span class="q-number">Q${remaining} / 30</span>
    </div>
    <p class="q-text">${q.question}</p>
    <div class="timer-wrap" id="timer-wrap">
      <span class="timer-icon">⏱</span>
      <div class="timer-bar-outer"><div class="timer-bar-inner" id="timer-bar" style="width:100%"></div></div>
      <span class="timer-text" id="timer-text">${formatTime(timerSec)}</span>
    </div>
    <div class="options" id="options">`;

  q.options.forEach((o,i)=>{
    let cls='opt-btn';
    if(state.answered){
      if(o.correct) cls+=' correct';
      else if(i===state.selectedIdx) cls+=' wrong';
    }
    html+=`<button class="${cls}" ${state.answered?'disabled':''} onclick="selectAnswer(${i})">
      <span class="opt-label">${o.label}</span>
      <span>${o.text}</span>
    </button>`;
  });
  html+=`</div>`;

  if(state.answered){
    const exp=q.explanation;
    html+=`<div class="explanation fade-in">
      <h4>📖 模範解答・思考プロセス</h4>
      <p>${exp.summary}</p>
      <div class="formula">${exp.formula}</div>
      <ul>${exp.points.map(p=>`<li>${p}</li>`).join('')}</ul>
    </div>
    <button class="next-btn" onclick="loadNextQuestion()">次の問題へ →</button>`;
  }

  html+=`</div>`;
  el.innerHTML=html;

  if(!state.answered) startTimer(timerSec);
}

function selectAnswer(idx){
  if(state.answered) return;
  state.answered=true;
  state.selectedIdx=idx;
  state.sessionTotal++;
  clearTimer();
  const q=state.currentQ;
  const correct=q.options[idx].correct;
  if(correct) state.sessionCorrect++;
  addHistory(q,correct);
  renderQuiz();
}

// ===== TIMER =====
function startTimer(sec){
  state.timerRemaining=sec;
  const total=sec;
  state.timerInterval=setInterval(()=>{
    state.timerRemaining--;
    const bar=document.getElementById('timer-bar');
    const txt=document.getElementById('timer-text');
    if(!bar||!txt){clearTimer();return}
    const pct=Math.max(0,state.timerRemaining/total*100);
    bar.style.width=pct+'%';
    if(pct<20) bar.classList.add('warn');
    txt.textContent=formatTime(state.timerRemaining);
    if(state.timerRemaining<=0){
      clearTimer();
      txt.textContent='TIME UP';
    }
  },1000);
}
function clearTimer(){if(state.timerInterval){clearInterval(state.timerInterval);state.timerInterval=null}}
function formatTime(s){if(s<=0)return'0:00';return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')}

// ===== COMPLETE =====
function renderComplete(){
  const rate=state.sessionTotal?Math.round(state.sessionCorrect/state.sessionTotal*100):0;
  let grade='C';
  if(rate>=90) grade='S';
  else if(rate>=80) grade='A';
  else if(rate>=70) grade='B';

  document.getElementById('page-quiz').innerHTML=`
    <div class="card complete-screen fade-in">
      <h2>🎉 全30問 完走！</h2>
      <div class="big-score" style="color:${rate>=70?'var(--green)':'var(--red)'}">${rate}%</div>
      <p style="color:var(--slate);margin-bottom:.5rem">正答数: ${state.sessionCorrect} / ${state.sessionTotal}</p>
      <p style="color:var(--gold);font-size:1.2rem;font-weight:700;margin-bottom:1.5rem">評価: ${grade}ランク</p>
      <p style="color:var(--slate);font-size:.85rem;margin-bottom:1.5rem">
        ${rate>=80?'素晴らしい数値感覚です。実践でも活かせるレベルです。':rate>=60?'基礎力は十分です。上級問題の復習で更なる向上を目指しましょう。':'基本フレームワークの復習を推奨します。業界別の数値感覚を強化しましょう。'}
      </p>
      <button class="start-btn" onclick="startQuiz()">もう一度チャレンジ</button>
      <button class="next-btn" style="margin-left:.5rem;background:var(--navy-mid);color:var(--white);border:1px solid var(--card-border)" onclick="showPage('home')">ダッシュボードへ</button>
    </div>`;
}

// ===== HISTORY =====
function renderHistory(){
  const h=getHistory();
  const el=document.getElementById('page-history');

  const filters=['all','製造業','小売業','卸売業','サービス業'];
  let filtered=state.historyFilter==='all'?h:h.filter(x=>x.industry===state.historyFilter);

  let html=`<div class="card fade-in">
    <h3 style="font-size:1rem;font-weight:600;margin-bottom:1rem;color:var(--gold)">学習履歴</h3>
    <div class="filter-chips">
      ${filters.map(f=>`<button class="chip ${state.historyFilter===f?'active':''}" onclick="setHistoryFilter('${f}')">${f==='all'?'すべて':f}</button>`).join('')}
    </div>
    <div class="history-controls">
      <span style="font-size:.78rem;color:var(--slate)">${filtered.length}件の記録</span>
      <span style="flex:1"></span>
      ${h.length?`<button class="del-all-btn" onclick="clearAllHistory()">全履歴を削除</button>`:''}
    </div>`;

  if(filtered.length===0){
    html+=`<div class="empty-state"><div class="icon">📊</div><p>まだ学習履歴がありません。<br>演習を開始して記録を積み上げましょう。</p></div>`;
  } else {
    html+=`<div style="overflow-x:auto"><table class="history-table">
      <thead><tr><th>日時</th><th>業界</th><th>レベル</th><th>問題</th><th>結果</th><th></th></tr></thead><tbody>`;
    filtered.forEach((r,i)=>{
      const d=new Date(r.date);
      const ds=`${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
      const origIdx=h.indexOf(r);
      html+=`<tr>
        <td style="white-space:nowrap;font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--slate)">${ds}</td>
        <td>${r.industry}</td>
        <td>${r.level}</td>
        <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.title}</td>
        <td class="${r.correct?'result-correct':'result-wrong'}">${r.correct?'✓ 正解':'✗ 不正解'}</td>
        <td><button class="del-row-btn" onclick="deleteHistoryItem(${origIdx})">削除</button></td>
      </tr>`;
    });
    html+=`</tbody></table></div>`;
  }
  html+=`</div>`;
  el.innerHTML=html;
}

function setHistoryFilter(f){state.historyFilter=f;renderHistory()}
function deleteHistoryItem(idx){
  const h=getHistory();
  h.splice(idx,1);
  saveHistory(h);
  renderHistory();
}
function clearAllHistory(){
  if(!confirm('全ての学習履歴を削除しますか？')) return;
  saveHistory([]);
  renderHistory();
}

// ===== INIT =====
showPage('home');
</script>
</body>
</html>
